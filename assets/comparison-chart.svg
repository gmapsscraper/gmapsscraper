<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" fill="none">
  <rect width="700" height="300" rx="12" fill="#f8fafc"/>
  <text x="350" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Manual Copy-Paste vs Google Maps Scraper</text>

  <!-- Left: Manual -->
  <rect x="40" y="55" width="280" height="220" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="180" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">❌ Manual Method</text>

  <text x="60" y="115" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">⏱ Time for 100 leads:</text>
  <text x="60" y="138" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#dc2626">6+ hours</text>

  <text x="60" y="170" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Copy name → paste → copy phone → paste</text>
  <text x="60" y="188" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">→ copy address → paste → repeat 100x</text>

  <text x="60" y="218" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• Error-prone (typos, missed fields)</text>
  <text x="60" y="236" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• Only 5-8 fields captured</text>
  <text x="60" y="254" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• No coordinates or Place IDs</text>

  <!-- Right: Automated -->
  <rect x="380" y="55" width="280" height="220" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="520" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#16a34a">✅ GMaps Scraper</text>

  <text x="400" y="115" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">⏱ Time for 100 leads:</text>
  <text x="400" y="138" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#16a34a">3 minutes</text>

  <text x="400" y="170" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Click Start → auto-scroll → auto-extract</text>
  <text x="400" y="188" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">→ click CSV → done</text>

  <text x="400" y="218" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• 100% accurate (direct from source)</text>
  <text x="400" y="236" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• 30+ fields per business</text>
  <text x="400" y="254" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• GPS coordinates, IDs included</text>

  <!-- Arrow -->
  <text x="340" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#4f46e5">→</text>

  <!-- Bottom stat -->
  <text x="350" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#4f46e5">120x faster · 4x more data fields · Zero errors</text>
</svg>
