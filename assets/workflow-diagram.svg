<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" fill="none">
  <rect width="700" height="180" rx="12" fill="#f8fafc"/>
  <text x="350" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">How It Works — 3 Simple Steps</text>

  <!-- Step 1 -->
  <rect x="30" y="50" width="180" height="110" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="120" cy="75" r="14" fill="#4f46e5"/>
  <text x="120" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="white">1</text>
  <text x="120" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4f46e5">Search</text>
  <text x="120" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Go to Google Maps</text>
  <text x="120" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">or Bing Maps and</text>
  <text x="120" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">search for businesses</text>

  <!-- Arrow 1→2 -->
  <path d="M220 105 L250 105" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <path d="M245 100 L255 105 L245 110" fill="#4f46e5"/>

  <!-- Step 2 -->
  <rect x="260" y="50" width="180" height="110" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="350" cy="75" r="14" fill="#4f46e5"/>
  <text x="350" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="white">2</text>
  <text x="350" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#4f46e5">Extract</text>
  <text x="350" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Click Start — auto</text>
  <text x="350" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">scrolls, clicks, and</text>
  <text x="350" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">captures 30+ fields</text>

  <!-- Arrow 2→3 -->
  <path d="M450 105 L480 105" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
  <path d="M475 100 L485 105 L475 110" fill="#4f46e5"/>

  <!-- Step 3 -->
  <rect x="490" y="50" width="180" height="110" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <circle cx="580" cy="75" r="14" fill="#16a34a"/>
  <text x="580" y="80" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="white">3</text>
  <text x="580" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#16a34a">Export</text>
  <text x="580" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Download CSV and</text>
  <text x="580" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">import into your CRM</text>
  <text x="580" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">HubSpot, Salesforce...</text>
</svg>
